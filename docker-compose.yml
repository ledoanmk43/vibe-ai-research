services:
  postgres:
    image: postgres:16-alpine
    container_name: laundry_crm_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-laundry_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-laundry_secret}
      POSTGRES_DB: ${POSTGRES_DB:-laundry_crm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-laundry_user} -d ${POSTGRES_DB:-laundry_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: laundry_crm_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./apps/api/.env
    environment:
      DB_HOST: postgres

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: laundry_crm_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file:
      - ./apps/web/.env.local

volumes:
  pgdata:
